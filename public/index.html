<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Один Пост</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div id="authBlock">
        <div class="auth-card">
            <div class="logo">
                <svg viewBox="0 0 40 40" width="40" height="40"><rect x="4" y="8" width="32" height="24" rx="4" fill="none" stroke="#2688EB" stroke-width="2.5"/><line x1="12" y1="16" x2="28" y2="16" stroke="#2688EB" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="22" x2="24" y2="22" stroke="#94C5FF" stroke-width="2.5" stroke-linecap="round"/></svg>
            </div>
            <h1>Один Пост</h1>
            <p class="subtitle">Одна мысль в день</p>
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            <div id="loginForm">
                <form id="loginFormEl">
                    <div class="form-group"><input type="text" id="loginUsername" placeholder="Логин" required minlength="3"></div>
                    <div class="form-group"><input type="password" id="loginPassword" placeholder="Пароль" required minlength="4"></div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                    <div id="loginError" class="error-msg"></div>
                </form>
            </div>
            <div id="registerForm" class="hidden">
                <form id="registerFormEl">
                    <div class="form-group"><input type="text" id="regUsername" placeholder="Придумайте логин" required minlength="3"></div>
                    <div class="form-group"><input type="password" id="regPassword" placeholder="Придумайте пароль" required minlength="4"></div>
                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                    <div id="registerError" class="error-msg"></div>
                </form>
            </div>
        </div>
    </div>

    <div id="appBlock" class="hidden">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="5" width="18" height="14" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><line x1="7" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="7" y1="14" x2="13" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/></svg>
                Один Пост
            </div>
            <nav class="sidebar-nav">
                <button class="sidebar-btn active" data-page="feed">
                    <svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                    Лента
                </button>
                <button class="sidebar-btn" data-page="messages">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 012 2v10a2 2 0 01-2 2H8l-4 4V6a2 2 0 012-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="8" cy="11" r="1.25" fill="currentColor"/><circle cx="12" cy="11" r="1.25" fill="currentColor"/><circle cx="16" cy="11" r="1.25" fill="currentColor"/></svg>
                    Сообщения <span id="msgBadge" class="badge hidden">0</span>
                </button>
                <button class="sidebar-btn" data-page="settings">
                    <svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 1v3m0 16v3M1 12h3m16 0h3M4.93 4.93l2.12 2.12m9.9 9.9l2.12 2.12M4.93 19.07l2.12-2.12m9.9-9.9l2.12-2.12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Настройки
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-avatar" id="sidebarAvatar">?</div>
                <div class="sidebar-user"><div class="sidebar-username" id="sidebarUsername">Пользователь</div></div>
                <button class="sidebar-logout" id="logoutBtn" title="Выйти">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5m5 5H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="content-wrapper">
                <div id="feedPage">
                    <div class="create-post">
                        <div class="create-post-header">
                            <div class="create-post-avatar" id="createPostAvatar">?</div>
                            <div class="create-post-input" id="openPostModal">Что у вас нового?</div>
                        </div>
                    </div>
                    <div id="feedContainer"></div>
                </div>
                <div id="profilePage" class="hidden"></div>
                <div id="settingsPage" class="hidden">
                    <div class="settings-page">
                        <div id="settingsSuccess" class="settings-success hidden"></div>
                        <div class="settings-card">
                            <h3>Оформление</h3>
                            <div class="theme-toggle-row">
                                <span>Тёмная тема</span>
                                <label class="theme-switch">
                                    <input type="checkbox" id="themeToggle">
                                    <span class="theme-slider"></span>
                                </label>
                            </div>
                        </div>
                        <div class="settings-card">
                            <h3>Аватар</h3>
                            <div class="settings-avatar-area">
                                <div id="settingsAvatarContainer"></div>
                                <div><label class="settings-avatar-btn" for="avatarInput">Загрузить фото</label><input type="file" id="avatarInput" style="display:none;" accept="image/*"></div>
                            </div>
                        </div>
                        <div class="settings-card">
                            <h3>Профиль</h3>
                            <div class="settings-field"><label>Имя пользователя</label><input type="text" id="settingsUsername" placeholder="Ваше имя"></div>
                            <div class="settings-field"><label>О себе</label><textarea id="settingsBio" placeholder="Расскажите о себе..."></textarea><div class="hint">До 200 символов</div></div>
                            <button class="btn-save" id="saveProfile">Сохранить</button>
                        </div>
                        <div class="settings-card">
                            <h3>Пароль</h3>
                            <div class="settings-field"><label>Новый пароль</label><input type="password" id="settingsPassword" placeholder="Оставьте пустым, чтобы не менять"><div class="hint">Минимум 4 символа</div></div>
                            <button class="btn-save" id="savePassword">Сменить пароль</button>
                        </div>
                        <div class="settings-card mobile-logout-card">
                            <button class="btn-logout-mobile" id="logoutBtnMobile">
                                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5m5 5H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                Выйти из аккаунта
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="messagesPage" class="hidden" style="width: 100%;">
                <div class="messages-layout" id="messagesLayout">
                    <div class="dialogs-sidebar" id="dialogsSidebar">
                        <div class="dialogs-header">Сообщения</div>
                        <div class="search-chat">
                            <input type="text" id="searchUserInput" placeholder="Поиск...">
                            <div id="searchResults" class="search-results hidden"></div>
                        </div>
                        <div class="dialogs-list" id="dialogsList"></div>
                    </div>
                    <div class="chat-area" id="chatArea">
                        <div class="chat-header" id="chatPartnerName">
                            <button class="chat-back-btn" id="chatBackBtn">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 12H5m7-7l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                            <span id="chatPartnerText">Выберите диалог</span>
                        </div>
                        <div class="chat-messages" id="chatMessages">
                            <div class="chat-empty">Выберите диалог или найдите пользователя</div>
                        </div>
                        <div class="chat-input">
                            <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
                            <button id="sendMessageBtn" disabled>Отправить</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="postModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Новый пост</h3>
            <textarea id="postTextarea" placeholder="Что у вас на уме?"></textarea>
            <div class="photo-upload-area">
                <label class="photo-upload-label" for="photoInput" id="photoLabel">
                    <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
                    Фото
                </label>
                <input type="file" id="photoInput" class="photo-upload-input" accept="image/*">
                <div id="photoPreview" class="photo-preview hidden"><img id="photoPreviewImg" src="" alt="Превью"><button class="remove-photo" id="removePhoto">✕</button></div>
            </div>
            <div id="postLimitWarning" class="limit-warning hidden">Вы уже опубликовали пост сегодня. Приходите завтра!</div>
            <div class="modal-actions">
                <button class="btn-cancel" id="closeModal">Отмена</button>
                <button class="btn-submit" id="publishBtn">Опубликовать</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
